# Example manifest.yaml for a ModuLab module.
# Full field reference: schema/v1/manifest.schema.json (vendored) and GUIDE.md, chapter "Manifest reference".

name: "example"
version: "0.1.0"
author: "Your name or organization"
license: "MIT"
category: "productivity"
min_core: "v1"
tier: 2

# Optional: localized store copy. Falls back to the raw name/no blurb if omitted.
display_name:
  en: "Example"
  de: "Beispiel"
description:
  en: "A short description shown in the Module Store."
  de: "Eine kurze Beschreibung im Module Store."

# Optional: filename of a logo shipped at this repo's root.
# logo: "logo.png"

handler: "handlers/index.ts"

# Tier 3 only: hostnames the Deno worker may connect to (enforced by --allow-net).
# Tier 2 must not declare this.
# egress_allowlist:
#   - "api.example.com"

# Optional: background cron jobs (tier 2/3), evaluated at minute granularity.
# jobs:
#   - name: "daily-report"
#     schedule: "0 9 * * *"
#     handler: "jobs/report.ts"
#     catch_up: false

# Tier 1 only, required (instead of handler/egress_allowlist/jobs above):
# config-driven CRUD, no handler code at all. See GUIDE.md, chapter
# "Tier 1: config-driven CRUD" for the full example (incl. the required
# migrations/001_initial.sql shape) and the generated API/UI it gives you.
# crud:
#   table: "items"
#   owner_scoped: false
#   fields:
#     - name: "title"
#       type: "string"
#       required: true
#     - name: "notes"
#       type: "text"
#       encrypted: true

# Planned, not yet enforced by Core - declaring these today has no effect:
# resources:
#   memory: "128m"
#   timeout: "10s"
# storage:
#   quota: "1g"

# See schema/v1/manifest.schema.json for the exact shape of each of these fields.
